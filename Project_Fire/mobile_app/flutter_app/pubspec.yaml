name: wildfire_detection
description: Wildfire Detection Mobile App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.6
  image: ^4.0.0
  location: ^5.0.0
  http: ^1.1.0
  provider: ^6.0.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  flutter_local_notifications: ^17.2.1
  fl_chart: ^0.66.0
  intl: ^0.19.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/